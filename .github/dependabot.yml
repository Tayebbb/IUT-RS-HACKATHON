version: 2
updates:
  # Root workspaces (backend/frontend/bot inherit via npm workspaces)
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      minor-and-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: npm
    directory: '/backend'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: '/frontend'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: '/bot'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions themselves
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Dockerfiles
  - package-ecosystem: docker
    directory: '/backend'
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: '/frontend'
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: '/bot'
    schedule:
      interval: weekly
