name: Release · Build & Push Images

# Triggered when a semver tag is pushed, e.g. v1.0.0, v1.2.3-rc.1
# Also runnable manually via workflow_dispatch (pushes the :main tag).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & push · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            file: ./backend/Dockerfile
            build-args: ''
          - service: bot
            context: ./bot
            file: ./bot/Dockerfile
            build-args: ''
          - service: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build-args: |
              VITE_BACKEND_URL=${{ vars.VITE_BACKEND_URL || 'http://localhost:4000' }}
              VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL || 'http://localhost:4000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/opm-${{ matrix.service }}
          # Produces tags like: v1.2.3, 1.2.3, 1.2, 1, latest (semver), + sha-<short>, + main
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─── GitHub Release with generated notes ─────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Container images published to GHCR under `${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/opm-*`:
            - `opm-backend:${{ github.ref_name }}`
            - `opm-frontend:${{ github.ref_name }}`
            - `opm-bot:${{ github.ref_name }}`

            Pull with:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/opm-backend:${{ github.ref_name }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/opm-frontend:${{ github.ref_name }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/opm-bot:${{ github.ref_name }}
            ```
